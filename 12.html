<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var frutas = ["Banana", "Maçã", "Laranja", "Abacaxi"];
        alert(frutas); // Acessa o primeiro elemento do array
        frutas.push("Uva"); // Adiciona um novo elemento ao final do array
        alert(frutas); // Exibe o array atualizado 
        frutas.pop(); // Remove o último elemento do array
        alert(frutas); // Exibe o array atualizado
        frutas.unshift("Pera"); // Adiciona um novo elemento ao início do array
        alert(frutas); // Exibe o array atualizado
        frutas.shift(); // Remove o primeiro elemento do array
        alert(frutas); // Exibe o array atualizado
        alert(frutas.length); // Exibe o número de elementos no array
        alert(frutas.indexOf("Laranja")); // Acessa o índice do elemento "Laranja" no array
        alert(frutas.includes("Maçã")); // Verifica se o elemento "Maçã" está presente no array 
        frutas.splice(1, 1); // Remove o elemento no índice 1 do array
        alert(frutas); // Exibe o array atualizado
        frutas.sort(); // Ordena os elementos do array em ordem alfabética
        alert(frutas); // Exibe o array ordenado    
        frutas.slice(1, 2); // Cria um novo array com os elementos do índice 1 ao índice 2 (exclusivo)
        alert(frutas); // Exibe o array original (sem alterações)
        
    </script>
</body>
</html>
