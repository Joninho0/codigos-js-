<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var frutas = ["Banana", "Maçã", "Laranja", "Abacaxi"];
        alert(frutas); // Acessa o primeiro elemento do array
        frutas.push("Uva"); // Adiciona um novo elemento ao final do array
        alert(frutas); // Exibe o array atualizado 
        frutas.pop(); // Remove o último elemento do array
        alert(frutas); // Exibe o array atualizado
        frutas.unshift("Pera"); // Adiciona um novo elemento ao início do array
        alert(frutas); // Exibe o array atualizado
        frutas.shift(); // Remove o primeiro elemento do array
        alert(frutas); // Exibe o array atualizado
        alert(frutas.length); // Exibe o número de elementos no array
    </script>
</body>
</html>
